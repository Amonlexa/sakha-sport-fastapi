services:
  api:
    build: .
    container_name: sakha_sport_api
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app
    command: python -m uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      - db

  db:
    image: postgres:16
    container_name: sakha_sport_db
    environment:
      POSTGRES_DB: sakha_sport
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
